<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA / Mobile web app setup -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#003459">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <title>台灣旅遊達人 - 行程 Prompt 產生器</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blurred-bg"></div>
    
    <main class="container">
        <header>
            <div class="logo">
                <img src="icon.svg" alt="App Icon" width="48" height="48">
                <h1>台灣旅遊達人</h1>
            </div>
            <p>輕鬆產生設計精良的行程規劃 Prompt 🤖</p>
        </header>

        <section class="api-integration-card" id="weather-card">
            <h3><i class='bx bx-cloud-sun'></i> 天氣小幫手 (Open Data API)</h3>
            <p class="api-desc">輸入縣市並獲取天氣，幫助行程評估（最高二個 API 應用展示）</p>
            <div class="weather-controls">
                <select id="weather-city">
                    <option value="25.03,121.56">台北市</option>
                    <option value="24.14,120.68">台中市</option>
                    <option value="22.99,120.21">台南市</option>
                    <option value="22.62,120.31">高雄市</option>
                    <option value="23.97,121.60">花蓮縣</option>
                    <option value="22.75,121.14">台東縣</option>
                </select>
                <button type="button" id="btn-get-weather" class="btn btn-secondary">查詢預報</button>
            </div>
            <div id="weather-result" class="weather-result hidden">
                <span id="weather-icon" class="weather-icon">🌤️</span>
                <span id="weather-text">讀取中...</span>
            </div>
        </section>

        <form id="prompt-form" class="glass-form">
            <div class="form-group row">
                <div class="col">
                    <label for="start-date"><i class='bx bx-calendar'></i> 出發日期</label>
                    <input type="date" id="start-date" required>
                </div>
                <div class="col">
                    <label for="end-date"><i class='bx bx-calendar-event'></i> 結束日期</label>
                    <input type="date" id="end-date" required>
                </div>
            </div>

            <div class="form-group row">
                <div class="col">
                    <label for="location"><i class='bx bx-map-pin'></i> 旅遊地點</label>
                    <input type="text" id="location" placeholder="例如：台南市、阿里山" required>
                </div>
                <div class="col">
                    <label for="budget"><i class='bx bx-wallet'></i> 旅遊預算</label>
                    <input type="text" id="budget" placeholder="例如：每人 5000 元" required>
                </div>
            </div>

            <div class="form-group">
                <label for="thoughts"><i class='bx bx-message-rounded-dots'></i> 實際感想 / 特定需求</label>
                <textarea id="thoughts" rows="3" placeholder="例如：希望行程不要太緊湊，想多吃點在地小吃，會帶長輩同行..." required></textarea>
            </div>

            <div class="form-group">
                <label for="output-format"><i class='bx bx-table'></i> AI 回覆格式</label>
                <select id="output-format">
                    <option value="表格版">表格版 (方便貼至 HackMD 觀看)</option>
                    <option value="條列式版">條列式版 (文字閱讀直覺清晰)</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" id="btn-generate">
                <i class='bx bx-magic-wand'></i> 產生神級 Prompt
            </button>
        </form>

        <section class="result-section hidden" id="result-section">
            <div class="result-header">
                <h3><i class='bx bx-check-circle'></i> 專屬 Prompt 已產生</h3>
                <button class="btn btn-icon" id="btn-copy" title="複製到剪貼簿">
                    <i class='bx bx-copy'></i> <span id="copy-text">一鍵複製</span>
                </button>
            </div>
            <div class="prompt-output" id="prompt-output">
                <!-- 產生的 prompt 會放在這裡 -->
            </div>
            <a href="https://chatgpt.com" target="_blank" class="btn btn-external">
                <i class='bx bx-link-external'></i> 前往 ChatGPT 貼上
            </a>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
